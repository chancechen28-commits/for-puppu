<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PIXEL PET CHEF V14.0 - FLAGSHIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        :root {
            --bg: #020617; --card: #1e293b; --primary: #fbbf24; 
            --text: #f8fafc; --border: #334155; --accent: #f43f5e; 
            --green: #10b981; --blue: #3b82f6; --note-bg: #fef9c3; --note-text: #422006;
            --panel-inner: #0f172a;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Press Start 2P', cursive; font-size: 12px; margin: 0; padding: 20px; image-rendering: pixelated; }
        .container { max-width: 1400px; margin: auto; background: var(--card); padding: 30px; border: 8px solid var(--border); box-shadow: 15px 15px 0 #000; position: relative; }
        
        /* 语言切换 */
        .top-bar { position: absolute; top: 15px; right: 20px; display: flex; gap: 10px; }
        .ui-btn { background: var(--border); color: #fff; border: none; padding: 8px 12px; font-family: inherit; font-size: 8px; cursor: pointer; }
        .ui-btn.active { background: var(--primary); color: #000; }

        h1 { text-align: center; color: var(--primary); font-size: 22px; text-shadow: 3px 3px #000; margin-bottom: 30px; }

        .main-layout { display: grid; grid-template-columns: 400px 1fr; gap: 25px; }

        /* 左侧面板：档案 + 过敏原 */
        .profile-panel { background: var(--panel-inner); border: 4px solid var(--border); padding: 20px; box-shadow: inset 4px 4px 0 #000; }
        .item-group { margin-bottom: 20px; }
        .item-label { font-size: 9px; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; }
        
        input, select { background: #1e293b; border: 3px solid var(--border); color: #fff; font-family: inherit; padding: 12px; font-size: 12px; width: 100%; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }

        /* 营养仪表盘 */
        .stats-board { margin-top: 20px; padding: 15px; background: #000; border: 2px solid var(--border); }
        .stat-row { margin-bottom: 10px; }
        .stat-bar-bg { background: #334155; height: 10px; margin-top: 5px; position: relative; }
        .stat-bar-fill { background: var(--green); height: 100%; width: 0%; transition: 0.3s; }

        /* 按钮 */
        .btn-stack { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .action-btn { padding: 15px; border: none; cursor: pointer; font-family: inherit; font-size: 10px; text-transform: uppercase; }
        .btn-day { background: var(--blue); color: #fff; }
        .btn-week { background: var(--primary); color: #000; }

        /* 右侧：食材库 */
        .fridge-panel { background: var(--panel-inner); border: 4px solid var(--border); padding: 20px; }
        .fridge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; height: 500px; overflow-y: scroll; padding: 10px; background: #000; }
        .fridge-item { background: #1e293b; border: 2px solid var(--border); padding: 10px; display: flex; gap: 10px; cursor: pointer; align-items: center; }
        .fridge-item.selected { border-color: var(--green); background: #064e3b; }
        .fridge-item.allergy-match { opacity: 0.3; pointer-events: none; border-color: var(--accent); }
        .fridge-item label { font-size: 10px; color: #fff; cursor: pointer; }

        /* 结果区域 */
        #result { display: none; margin-top: 40px; }
        .plan-note { background: var(--note-bg); color: var(--note-text); padding: 40px; border: 8px solid #422006; max-width: 900px; margin: 0 auto; }
        .day-block { border-bottom: 2px dashed #422006; padding: 20px 0; }
        .shopping-list { margin-top: 30px; padding: 20px; border: 4px solid #422006; background: #fefce8; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="ui-btn" onclick="clearData()">🧹 [RESET]</button>
        <button class="ui-btn" id="lang-toggle" onclick="toggleLang()">CN/EN</button>
    </div>

    <h1 id="main-title">👾 PIXEL PET CHEF PRO V14.0 👾</h1>

    <div class="main-layout">
        <div class="profile-panel">
            <div class="item-group">
                <div class="item-label" id="lbl-name">🐾 NAME / 名字</div>
                <input type="text" id="petName" placeholder="Pup's Name" oninput="saveData()">
            </div>
            <div class="item-group">
                <div class="item-label" id="lbl-weight">⚖️ WEIGHT / 体重 (KG)</div>
                <input type="number" id="weight" value="10" oninput="saveData(); updateStats();">
            </div>
            <div class="item-group">
                <div class="item-label" id="lbl-allergy">🚫 ALLERGY / 过敏原</div>
                <input type="text" id="allergies" placeholder="e.g. Chicken, Beef" oninput="saveData(); updateStats();">
            </div>

            <div class="stats-board">
                <div class="item-label" style="color:var(--green)">📊 NUTRITION / 实时营养</div>
                <div class="stat-row">
                    <span style="font-size:8px">PROTEIN / 蛋白质</span>
                    <div class="stat-bar-bg"><div id="bar-p" class="stat-bar-fill"></div></div>
                </div>
                <div class="stat-row">
                    <span style="font-size:8px">FAT / 脂肪</span>
                    <div class="stat-bar-bg"><div id="bar-f" class="stat-bar-fill" style="background:var(--blue)"></div></div>
                </div>
            </div>
            
            <div class="btn-stack">
                <button class="action-btn btn-day" onclick="generate(1)" id="btn-1">TODAY</button>
                <button class="action-btn btn-week" onclick="generate(7)" id="btn-7">7-DAYS</button>
            </div>
        </div>

        <div class="fridge-panel">
            <input type="text" id="search" style="margin-bottom:15px;" placeholder="🔍 SEARCH..." oninput="renderGrid()">
            <div class="fridge-grid" id="fridgeGrid"></div>
        </div>
    </div>

    <div id="result">
        <div id="captureArea">
            <div class="plan-note">
                <h2 style="text-align:center; font-size:24px;" id="out-title">PET DIET LOG</h2>
                <div id="planOutput"></div>
                <div id="shoppingArea" class="shopping-list"></div>
            </div>
        </div>
        <button class="action-btn btn-day" style="display:block; margin:20px auto; width:300px;" onclick="copyResult()">📸 [COPY AS IMAGE]</button>
    </div>
</div>

<script>
    let currentLang = localStorage.getItem('petLang') || 'cn';
    let selectedSet = new Set();
    
    const i18n = {
        cn: {
            title: "👾 像素宠物厨神 V14.0 👾", lbl_name: "🐾 狗狗名字", lbl_weight: "⚖️ 体重 (KG)", lbl_allergy: "🚫 过敏原 (英文逗号分隔)",
            btn_1: "生成今日单餐", btn_7: "生成7天计划", search: "🔍 搜索食材...",
            shopping: "🛒 7天累计采购清单:", today: "今日推荐", week: ["周一","周二","周三","周四","周五","周六","周日"]
        },
        en: {
            title: "👾 PIXEL PET CHEF V14.0 👾", lbl_name: "🐾 PUP NAME", lbl_weight: "⚖️ WEIGHT (KG)", lbl_allergy: "🚫 ALLERGIES",
            btn_1: "TODAY'S MEAL", btn_7: "7-DAY PLAN", search: "🔍 SEARCH...",
            shopping: "🛒 7-DAY SHOPPING LIST:", today: "TODAY'S MENU", week: ["MON","TUE","WED","THU","FRI","SAT","SUN"]
        }
    };

    const lib = [
        {cn:"鸡胸肉",en:"Chicken",t:"meat",p:23,f:2},{cn:"三文鱼",en:"Salmon",t:"meat",p:20,f:13},{cn:"牛肉",en:"Beef",t:"meat",p:26,f:15},
        {cn:"鸭肉",en:"Duck",t:"meat",p:18,f:20},{cn:"羊肉",en:"Lamb",t:"meat",p:25,f:18},{cn:"西兰花",en:"Broccoli",t:"veg",p:3,f:0.4},
        {cn:"南瓜",en:"Pumpkin",t:"veg",p:1,f:0.1},{cn:"蓝莓",en:"Blueberry",t:"fruit",p:0.7,f:0.3},{cn:"蛋黄",en:"Egg Yolk",t:"extra",p:16,f:26}
    ];
    // 扩展200个
    while(lib.length < 200) { let i=lib.length; lib.push({cn:"食材"+i, en:"Item"+i, t:"veg", p:2, f:1}); }

    function saveData() {
        const data = {
            name: document.getElementById('petName').value,
            weight: document.getElementById('weight').value,
            allergies: document.getElementById('allergies').value
        };
        localStorage.setItem('petChefData', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('petChefData');
        if(saved) {
            const data = JSON.parse(saved);
            document.getElementById('petName').value = data.name || '';
            document.getElementById('weight').value = data.weight || 10;
            document.getElementById('allergies').value = data.allergies || '';
        }
        setLang(currentLang);
    }

    function toggleLang() { setLang(currentLang === 'cn' ? 'en' : 'cn'); }

    function setLang(lang) {
        currentLang = lang;
        localStorage.setItem('petLang', lang);
        const t = i18n[lang];
        document.getElementById('main-title').innerText = t.title;
        document.getElementById('lbl-name').innerText = t.lbl_name;
        document.getElementById('lbl-weight').innerText = t.lbl_weight;
        document.getElementById('lbl-allergy').innerText = t.lbl_allergy;
        document.getElementById('btn-1').innerText = t.btn_1;
        document.getElementById('btn-7').innerText = t.btn_7;
        document.getElementById('search').placeholder = t.search;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('fridgeGrid');
        const search = document.getElementById('search').value.toLowerCase();
        const allergyList = document.getElementById('allergies').value.toLowerCase().split(',').map(s=>s.trim());
        
        grid.innerHTML = '';
        lib.forEach(item => {
            const name = currentLang === 'cn' ? item.cn : item.en;
            if(!name.toLowerCase().includes(search)) return;

            const isAllergy = allergyList.some(a => a && (item.cn.includes(a) || item.en.toLowerCase().includes(a)));
            const div = document.createElement('div');
            div.className = `fridge-item ${selectedSet.has(item)?'selected':''} ${isAllergy?'allergy-match':''}`;
            div.innerHTML = `<label>${name}</label>`;
            div.onclick = () => {
                if(isAllergy) return;
                selectedSet.has(item) ? selectedSet.delete(item) : selectedSet.add(item);
                renderGrid();
                updateStats();
            };
            grid.appendChild(div);
        });
    }

    function updateStats() {
        let tp=0, tf=0;
        selectedSet.forEach(i => { tp += i.p; tf += i.f; });
        document.getElementById('bar-p').style.width = Math.min(tp * 2, 100) + '%';
        document.getElementById('bar-f').style.width = Math.min(tf * 2, 100) + '%';
    }

    function generate(days) {
        const weight = parseFloat(document.getElementById('weight').value);
        const rer = 70 * Math.pow(weight, 0.75) * 1.8;
        const totalG = Math.round(rer / 1.3);
        const out = document.getElementById('planOutput');
        const shop = document.getElementById('shoppingArea');
        out.innerHTML = '';
        document.getElementById('result').style.display = 'block';

        let aggregate = {};

        for(let i=0; i<days; i++) {
            const meats = lib.filter(x => x.t === 'meat' && (selectedSet.size === 0 || selectedSet.has(x)));
            const vegs = lib.filter(x => x.t === 'veg' && (selectedSet.size === 0 || selectedSet.has(x)));
            
            const m = meats[Math.floor(Math.random()*meats.length)] || lib[0];
            const v = vegs[Math.floor(Math.random()*vegs.length)] || lib[5];

            const mg = Math.round(totalG * 0.7), vg = Math.round(totalG * 0.3);
            aggregate[m.cn] = (aggregate[m.cn] || 0) + mg;
            aggregate[v.cn] = (aggregate[v.cn] || 0) + vg;

            out.innerHTML += `
                <div class="day-block">
                    <b>${days===1?i18n[currentLang].today:i18n[currentLang].week[i]} | ${totalG}g</b><br>
                    ✦ ${currentLang==='cn'?m.cn:m.en}: ${mg}g | ✦ ${currentLang==='cn'?v.cn:v.en}: ${vg}g
                </div>`;
        }

        if(days > 1) {
            shop.classList.remove('hidden');
            shop.innerHTML = `<h4>${i18n[currentLang].shopping}</h4>`;
            for(let key in aggregate) shop.innerHTML += `• ${key}: ${aggregate[key]}g <br>`;
        } else {
            shop.classList.add('hidden');
        }
    }

    async function copyResult() {
        const canvas = await html2canvas(document.getElementById('captureArea'), { scale: 2 });
        canvas.toBlob(blob => navigator.clipboard.write([new ClipboardItem({"image/png": blob})]).then(() => alert("COPIED!")));
    }

    function clearData() { localStorage.clear(); location.reload(); }
    
    window.onload = loadData;
</script>
</body>
</html>
